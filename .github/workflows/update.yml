name: Auto Update Clean IPs

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# این بخش دسترسی نوشتن را به ربات می‌دهد تا ارور 128 برطرف شود
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # ارتقا به نسخه 4 برای رفع هشدار زرد رنگ
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ارتقا به نسخه 5 برای رفع هشدار زرد رنگ
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Aggregator Script
        run: python aggregate.py

      - name: Commit and Push output
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add my-clean-ips.json
          git commit -m "Auto-update clean IPs" || echo "No changes to commit"
          git push
